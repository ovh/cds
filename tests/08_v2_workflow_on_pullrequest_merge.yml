name: Workflow on pull-request merge
vars:
  cds_project: "ITV2WFPRMERGE"
  git_repo: "it_v2_workflow_pr_merge"
  cds_workflow: "WorkflowPRMerge"
testcases:
- name: Prepare test
  steps:
    - name: "Verify cdsctl configuration"
      script: "{{.cdsctl}} -f {{.cdsctl.config}} user me --format json"
      vars:
        cdsUser:
          from: result.systemoutjson.username

    - name: "Display username"
      info: "Connected CDS user is {{.cdsUser}}"

    - type: v2_install_gpg_key
      cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
      gpg_key_id: "{{.gpg.key_id}}"
      git_host: "{{.git.host}}"
      git_user: "{{.git.user}}"
      git_password: "{{.git.password}}"
      vars:
        emailaddress:
          from: result.emailaddress

    - type: v2_create_project
      cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
      cds_project: "{{.cds_project}}"
      git_host: "{{.git.host}}"
      git_user: "{{.git.user}}"
      git_password: "{{.git.password}}"
      cds_region: "{{.cds.region}}"
      git_emailAddress: "{{.emailaddress}}"

    - type: v2_add_git_repo
      cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
      cds_project: "{{.cds_project}}"
      cds_hook_url: "{{.forgejo.hook.url}}"
      git_host: "{{.git.host}}"
      git_user: "{{.git.user}}"
      git_password: "{{.git.password}}"
      git_repo: "{{.git_repo}}"

- name: Push workflow file
  steps:
    - type: v2_push_cds_files_on_repo
      git_repo: "{{.git_repo}}"
      git_host: "{{.git.host}}"
      git_user: "{{.git.user}}"
      git_email: "{{.Prepare-test.emailaddress}}"
      git_password: "{{.git.password}}"
      gpg_key_id: "{{.gpg.key_id}}"
      files:
        worker-models/debian.yml:
          name: docker-debian
          osarch: linux/amd64
          type: docker
          spec:
            image: buildpack-deps:bookworm
        workflows/workflow_pr_merge.yaml:
          name: {{.cds_workflow}}
          on:
            pull-request:
              types: ["closed"]
          jobs:
            myjob:
              runs-on: "{{.cds_project}}/my_vcs_server/{{.git.user}}/{{.git_repo}}/docker-debian"
              steps:
                - run: |-
                    #!/bin/bash
                    set -ex
                    echo "ASSERT_GIT_REF=${{ git.ref }}"
                    echo "ASSERT_GIT_SHA=${{ git.sha }}"
                    echo "ASSERT_PR_ID=${{ git.pullrequest_id }}"
                    echo "ASSERT_PR_TO=${{ git.pullrequest_to_ref }}"
                    echo "ASSERT_PR_FROM=${{ git.pullrequest_from_ref }}"
                    echo "ASSERT_EVENT_MERGED=${{ cds.event.pull_request.merged }}"
                    echo "ASSERT_EVENT_ACTION=${{ cds.event.action }}"

    - name: Check CDS project analyses status after push on master
      script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental project analysis list {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} --format json"
      assertions:
        - result.systemoutjson ShouldHaveLength 2
        - result.systemoutjson.systemoutjson0.status ShouldEqual "Skipped"
        - result.systemoutjson.systemoutjson1.status ShouldEqual "Success"
      retry: 100
      delay: 1

- name: Work on another git branch
  steps:
    - name: Create a file on a new-branch branch
      script: |-
        cd /tmp/repos/{{.git_repo}}
        git checkout -b new-branch
        echo 'FOO' > foo.md
        git add --all
        git commit --gpg-sign={{.gpg.key_id}} -m "add file and sign" --author "{{.git.user}} <{{.Prepare-test.emailaddress}}>"
        git push origin new-branch

    - name: Check CDS project analyses status after push on new-branch
      script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental project analysis list {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} --format json"
      assertions:
        - result.systemoutjson ShouldHaveLength 3
        - result.systemoutjson.systemoutjson0.status ShouldEqual "Skipped"
        - result.systemoutjson.systemoutjson1.status ShouldEqual "Success"
        - result.systemoutjson.systemoutjson2.status ShouldEqual "Success"
      retry: 100
      delay: 1

- name: Create Pull-Request
  steps:
    - name: Create the pull-request
      type: http
      method: POST
      url: "{{.git.host}}/api/v1/repos/{{.git.user}}/{{.git_repo}}/pulls"
      basic_auth_user: "{{.git.user}}"
      basic_auth_password: "{{.git.password}}"
      headers:
        Content-Type: application/json
      body: >
        {
          "base": "master",
          "body": "test body pull-request",
          "head": "new-branch",
          "title": "test pull-request"
        }
      assertions:
        - result.statuscode ShouldEqual 201
      vars:
        prNumber:
          from: result.bodyjson.number

- name: Merge pull-request
  steps:
    - name: Merge the pull-request
      type: http
      method: POST
      url: "{{.git.host}}/api/v1/repos/{{.git.user}}/{{.git_repo}}/pulls/{{.Create-Pull-Request.prNumber}}/merge"
      basic_auth_user: "{{.git.user}}"
      basic_auth_password: "{{.git.password}}"
      headers:
        Content-Type: application/json
      body: >
        {
          "Do": "merge"
        }
      assertions:
        - result.statuscode ShouldEqual 200
      retry: 10
      delay: 1

    - name: Get the merged pull-request to read the merge commit
      type: http
      method: GET
      url: "{{.git.host}}/api/v1/repos/{{.git.user}}/{{.git_repo}}/pulls/{{.Create-Pull-Request.prNumber}}"
      basic_auth_user: "{{.git.user}}"
      basic_auth_password: "{{.git.password}}"
      headers:
        Content-Type: application/json
      assertions:
        - result.statuscode ShouldEqual 200
        - result.bodyjson.merged ShouldBeTrue
        - result.bodyjson.merge_commit_sha ShouldNotBeEmpty
      retry: 10
      delay: 1
      vars:
        mergeCommit:
          from: result.bodyjson.merge_commit_sha

- name: Check workflow triggered by the merge and assert git context
  steps:
    - name: Check that the CDS workflow has one execution and is Success
      script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow history {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} {{.cds_workflow}} --format json"
      assertions:
        - result.systemoutjson ShouldHaveLength 1
        - result.systemoutjson.systemoutjson0.status ShouldEqual "Success"
      retry: 200
      delay: 1
      vars:
        workflowRunID:
          from: result.systemoutjson.systemoutjson0.id

    - name: Download logs and assert the git context of the merge event
      script: |-
        #!/bin/bash
        set -e
        FILE=/tmp/`uuidgen`
        mkdir -p $FILE && cd $FILE
        {{.cdsctl}} -f {{.cdsctl.config}} experimental workflow logs download {{.cds_project}} {{.workflowRunID}}
        LOG=$(cat {{.cds_workflow}}-*-myjob*)
        echo "$LOG"
        echo "$LOG" | grep -F "ASSERT_GIT_REF=refs/heads/master"
        echo "$LOG" | grep -F "ASSERT_GIT_SHA={{.Merge-pull-request.mergeCommit}}"
        echo "$LOG" | grep -F "ASSERT_PR_ID={{.Create-Pull-Request.prNumber}}"
        echo "$LOG" | grep -F "ASSERT_PR_TO=refs/heads/master"
        echo "$LOG" | grep -F "ASSERT_PR_FROM=refs/heads/new-branch"
        echo "$LOG" | grep -F "ASSERT_EVENT_MERGED=true"
        echo "$LOG" | grep -F "ASSERT_EVENT_ACTION=closed"
      retry: 60
      delay: 1
