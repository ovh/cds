name: Artifactory OCI
vars:
  cds_project: "ITV2ARTIFACTORYPLUGINSOCI"
  cds_workflow: "WorkflowOCI"
  git_repo: "it_v2_rt_plugins_oci"
  worker_model: "{{.cds_project}}/my_vcs_server/{{.git.user}}/{{.git_repo}}/docker-debian"
  rt_url: "rt_url"
  rt_token: "rt_token"
  rt_token_name: "rt_tokenName"
  rt_distribution_url: "rt_distribution_url"
  rt_project: "rt_project"
  rt_component: "rt_component"
  rt_project_key: "rt_project_key"

testcases:
- name: Prepare test
  steps:
  - name: "Verify cdsctl configuration"
    script: "{{.cdsctl}} -f {{.cdsctl.config}} user me --format json"
    vars:
      cdsUser:
        from: result.systemoutjson.username

  - name: "Display username"
    info: "Connected CDS user is {{.cdsUser}}"

  - type: v2_create_project
    cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
    cds_project: "{{.cds_project}}"
    git_host: "{{.git.host}}"
    git_user: "{{.git.user}}"
    git_password: "{{.git.password}}"
    cds_region: "{{.cds.region}}"

  - type: v2_add_git_repo
    cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
    cds_project: "{{.cds_project}}"
    cds_hook_url: "{{.forgejo.hook.url}}"
    git_host: "{{.git.host}}"
    git_user: "{{.git.user}}"
    git_password: "{{.git.password}}"
    git_repo: "{{.git_repo}}"

  - type: v2_install_gpg_key
    cdsctl_command: "{{.cdsctl}} -f {{.cdsctl.config}}"
    gpg_key_id: "{{.gpg.key_id}}"
    git_host: "{{.git.host}}"
    git_user: "{{.git.user}}"
    git_password: "{{.git.password}}"
    vars:
      emailaddress:
        from: result.emailaddress

  - name: Prepare integration for project
    script: |-
      /bin/bash -c cat <<- EOF > /tmp/artifactory-{{.cds_project}}.yaml
      name: artifactory-{{.rt_project}}
      model:
        name: Artifactory
      config:
        build.info.prefix:
          value: {{.rt_project}}/{{.rt_component}}
          type: string
        cds.repository:
          value: {{.rt_project}}-{{.rt_component}}-cds
          type: string
        distribution.url:
          value: {{.rt_distribution_url}}
          type: string
        platform:
          value: artifactory
          type: string
        project.key:
          value: {{.rt_project_key}}
          type: string
        promotion.maturity.high:
          value: release
          type: string
        promotion.maturity.low:
          value: snapshot
          type: string
        release.token:
          value: ""
          type: password
        repo.prefix:
          value: {{.rt_project}}-{{.rt_component}}
          type: string
        token:
          value: {{.rt_token}}
          type: password
        token.name:
          value: {{.rt_token_name}}
          type: string
        url:
          value: {{.rt_url}}
          type: string
      EOF

  - name: Import integration for project
    script: "{{.cdsctl}} -f {{.cdsctl.config}} project integration import {{.cds_project}} /tmp/artifactory-{{.cds_project}}.yaml"

  - name: Assert integration is imported on project
    script: '{{.cdsctl}} -f {{.cdsctl.config}} project integration list {{.cds_project}}'
    assertions:
    - result.systemout ShouldContainSubstring artifactory-{{.rt_project}}

- name: Push workflow file
  steps:
  - type: v2_push_non_cds_files_on_repo
    git_repo: "{{.git_repo}}"
    git_host: "{{.git.host}}"
    git_user: "{{.git.user}}"
    git_email: "{{.Prepare-test.emailaddress}}"
    git_password: "{{.git.password}}"
    gpg_key_id: "{{.gpg.key_id}}"
    files:
      chart/Chart.yaml:
        apiVersion: v2
        name: mychart
        description: A Helm chart for Kubernetes
        type: application
        version: "0.1.0"
        appVersion: "1.16.0"
      chart/templates/deployment.yaml:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: coucou
        spec:
          selector:
            matchLabels:
              helm.sh/chart: toto
      chart/values.yaml:
        replicaCount: 1
        image:
          repository: nginx
          pullPolicy: IfNotPresent
  - type: v2_push_cds_files_on_repo
    git_repo: "{{.git_repo}}"
    git_host: "{{.git.host}}"
    git_user: "{{.git.user}}"
    git_email: "{{.Prepare-test.emailaddress}}"
    git_password: "{{.git.password}}"
    gpg_key_id: "{{.gpg.key_id}}"
    files:
      worker-models/debian.yaml:
        name: docker-debian
        description: my debian worker model
        osarch: linux/amd64
        type: docker
        spec:
          image: buildpack-deps:bookworm
      workflows/workflowOCI.yaml:
        name: {{.cds_workflow}}
        on: [push]
        integrations: [artifactory-{{.rt_project}}]
        jobs:
          Push:
            runs-on: "{{.worker_model}}"
            steps:
            - uses: actions/checkout
            # buildpack-deps:bookworm does not ship helm/skopeo/flux: install them at runtime.
            - id: tools
              run: |
                set -e
                apt-get update && apt-get install -y --no-install-recommends skopeo
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                curl -fsSL https://fluxcd.io/install.sh | bash
            # OVHcloud Artifactory exposes Docker/OCI registries with the subdomain method
            # (<repo>.<host>), like CDS does for docker run results (<prefix>-docker.<host>).
            # The registry endpoint is therefore the virtual repo as a subdomain of the host.
            - id: login
              run: |
                set -e
                RT_HOST=$(echo "${CDS_INTEGRATION_ARTIFACT_MANAGER_URL}" | sed -E 's#^https?://##; s#/.*$##')
                REGISTRY="{{.rt_project}}-{{.rt_component}}-oci.${RT_HOST}"
                worker export RTHOST "${RT_HOST}"
                worker export REGISTRY "${REGISTRY}"
                # Unique version per run: the -oci repo is shared across runs, so fixed tags would
                # collide with leftovers in the -release maturity and confuse the run-result indexing.
                worker export TS "$(date +%s)"
                echo "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN}" | helm registry login "${REGISTRY}" -u "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN_NAME}" --password-stdin
                echo "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN}" | skopeo login "${REGISTRY}" -u "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN_NAME}" --password-stdin
            # 1) Helm chart pushed as an OCI artifact -> <prefix>-oci/mychart/0.1.0-<ts>
            - id: helmpush
              run: |
                set -e
                helm package chart/ --version "0.1.0-${{ steps.login.outputs.TS }}"
                helm push "mychart-0.1.0-${{ steps.login.outputs.TS }}.tgz" oci://${{ steps.login.outputs.REGISTRY }}
            - uses: actions/addRunResult
              with:
                type: oci
                path: mychart/0.1.0-${{ steps.login.outputs.TS }}
            # 2) Docker image copied with skopeo -> <prefix>-oci/busybox/<ts>
            - id: skopeocopy
              run: |
                set -e
                skopeo copy \
                  --src-creds "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN_NAME}:${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN}" \
                  --dest-creds "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN_NAME}:${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN}" \
                  docker://docker-hub-remote.${{ steps.login.outputs.RTHOST }}/busybox:1.36 \
                  docker://${{ steps.login.outputs.REGISTRY }}/busybox:${{ steps.login.outputs.TS }}
            - uses: actions/addRunResult
              with:
                type: oci
                path: busybox/${{ steps.login.outputs.TS }}
            # 3) Generic artifact pushed with flux -> <prefix>-oci/myapp/0.0.1-<ts>
            - id: fluxpush
              run: |
                set -e
                mkdir -p artifact && echo "hello oci" > artifact/data.txt
                flux push artifact oci://${{ steps.login.outputs.REGISTRY }}/myapp:0.0.1-${{ steps.login.outputs.TS }} --path=./artifact --source=cds --revision=0.0.1 --creds "${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN_NAME}:${CDS_INTEGRATION_ARTIFACT_MANAGER_TOKEN}"
            - uses: actions/addRunResult
              with:
                type: oci
                path: myapp/0.0.1-${{ steps.login.outputs.TS }}
          Release:
            needs: [Push]
            runs-on: "{{.worker_model}}"
            steps:
              - uses: actions/artifactoryRelease
                with:
                  artifacts: oci:**
  - name: Check CDS project analyses
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental project analysis list {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} --format json"
    assertions:
    - result.systemoutjson ShouldHaveLength 3
    retry: 100
    delay: 1
    vars:
      analysisID:
        from:
          result.systemoutjson.systemoutjson2.id

  - name: Get CDS project analysis
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental project analysis show {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} {{.analysisID}}"
    assertions:
    - 'result.systemout ShouldContainSubstring "status: Success"'
    retry: 100
    delay: 1

  - name: Get hook event status
    script: "{{.cdsctl}} -f {{.cdsctl.config}} admin hook repository event list my_vcs_server {{.git.user}}/{{.git_repo}} --format json"
    vars:
      events:
        from: result.systemoutjson

  - name: Check all hook events status
    range: "{{.events}}"
    script: "{{.cdsctl}} -f {{.cdsctl.config}} admin hook repository event show my_vcs_server {{.git.user}}/{{.git_repo}} {{.value.uuid}} --format json"
    info: "hook event {{.value.uuid}} ({{.value.created}} - {{.result.systemoutjson.last_error}}) status is {{.result.systemoutjson.status}}"
    assertions:
    - result.systemoutjson.status ShouldEqual Done
    retry: 150
    delay: 1

  - name: Check that the CDS workflow has at least one execution and is Success
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow history {{.cds_project}} my_vcs_server {{.git.user}}/{{.git_repo}} {{.cds_workflow}} --format json"
    assertions:
      - and:
        - result.systemoutjson ShouldHaveLength 1
        - or:
          - result.systemoutjson.systemoutjson0.status ShouldEqual Success
          - result.systemoutjson.systemoutjson0.status ShouldEqual Fail
    retry: 400
    delay: 1
    vars:
      workflowRunID:
        from: result.systemoutjson.systemoutjson0.id
      workflowRunStatus:
        from: result.systemoutjson.systemoutjson0.status

  - name: List all run results
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow result list {{.cds_project}} {{.workflowRunID}}"

  - name: Download logs
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow logs download {{.cds_project}} {{.workflowRunID}}"

  - name: Get run info
    script:  "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow info {{.cds_project}} {{.workflowRunID}}"

  - name: Get job info
    script:  "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow jobs status {{.cds_project}} {{.workflowRunID}}"

  - name: Display logs
    script: cat {{.cds_workflow}}*

  - name: Echo Status
    script: echo {{.workflowRunStatus}}
    assertions:
    - result.systemout ShouldEqual Success

  - name: Check that we have 3 run results of type oci
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow result list {{.cds_project}} {{.workflowRunID}} --filter type=oci --format json"
    assertions:
      - result.systemoutjson ShouldHaveLength 3
  - name: Check that we have 1 run result of type release
    script: "{{.cdsctl}} -f {{.cdsctl.config}} experimental workflow result list {{.cds_project}} {{.workflowRunID}} --filter type=release --format json"
    assertions:
      - result.systemoutjson ShouldHaveLength 1
