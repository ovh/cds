<nz-space-compact>
  <button nz-button (click)="setUnified()" [class.active]="mode === 'unified'">Unified</button>
  <button nz-button (click)="setSplit()" [class.active]="mode === 'split'">Split</button>
</nz-space-compact>

@for (i of items; track i; let idx = $index) {
  <nz-card [nzTitle]="getTitle(i)" class="coloredTitle">
    @if (idx < 10) {
      <app-diff-item [mode]="mode" [type]="i.type" [original]="i.before" [updated]="i.after"></app-diff-item>
    }
    @if (idx >= 10) {
      {{'common_diff_to_much_item' | translate}}
    }
  </nz-card>
}
