<h3><span nz-icon nzType="rocket" nzTheme="outline"></span> {{'usage_application_list' | translate}}</h3>
@if (applications) {
  <div class="nzSegment">
    @if (applications.length) {
      <nz-row>
        @for (app of applications; track app) {
          <nz-col [nzSpan]="4" [nzOffset]="2">
            <a [routerLink]="['/project', project.key, 'application', app.name]">{{app.name}}</a>
          </nz-col>
        }
      </nz-row>
    }
  </div>
}
