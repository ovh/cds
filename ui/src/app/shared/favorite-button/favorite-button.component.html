<div class="content">
  @if (loading) {
    <span nz-icon nzType="loading"></span>
  }
  @if (!loading) {
    <span nz-icon nzType="star" nzTheme="fill" [class.active]="!!bookmark" (click)="click()"
    [title]="(!!bookmark ? 'Remove' : 'Add') + ' ' + type + ' ' + (!!bookmark ? 'from' : 'to') + ' bookmarks'"></span>
  }
</div>
