<div class="node-wrapper" (click)="clickOnNode()" (dblclick)="$event.stopPropagation(); dblClickOnNode()"
  nz-popover [nzPopoverContent]="popupNode" nzPopoverPlacement="right" nzPopoverTrigger="click" [(nzPopoverVisible)]="menuVisible">
  @switch (node.type) {
    @case ('pipeline') {
      <app-workflow-wnode-pipeline [workflow]="workflow" [node]="node"
      [noderun]="currentNodeRun" [warnings]="warnings"></app-workflow-wnode-pipeline>
    }
    @case ('join') {
      <app-workflow-wnode-join [workflow]="workflow" [node]="node"
      [noderunStatus]="currentNodeRun?.status"></app-workflow-wnode-join>
    }
    @case ('fork') {
      <app-workflow-wnode-fork [noderunStatus]="currentNodeRun?.status"></app-workflow-wnode-fork>
    }
    @case ('outgoinghook') {
      <app-workflow-wnode-outgoing-hook [workflow]="workflow"
      [node]="node" [noderun]="currentNodeRun"></app-workflow-wnode-outgoing-hook>
    }
  }
</div>
<ng-template #popupNode>
  <app-workflow-menu-wnode-edit (event)="receivedEvent($event)" #menu></app-workflow-menu-wnode-edit>
</ng-template>
