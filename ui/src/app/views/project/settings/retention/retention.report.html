@if (report) {
  <div class="editor">
    @if (report?.workflows) {
      <nz-code-editor #editor [ngModel]="dataEditor" [nzEditorOption]="editorOption"
      (ngModelChange)="onEditorChange($event)"></nz-code-editor>
    }
    @if (!report?.workflows) {
      <i nz-icon nzType="stop" nzTheme="outline"></i>No workflow runs have been deleted
    }
  </div>
}
