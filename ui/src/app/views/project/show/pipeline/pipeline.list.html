@if (!loading) {
  <div class="pipelineList">
    <nz-row>
      <nz-col [nzSpan]="8">
        <h3>List of pipelines in the project</h3>
      </nz-col>
      <nz-col [nzSpan]="8" class="center">
        <button nz-button nzType="primary" [routerLink]="['./pipeline']" [disabled]="!project.permissions.writable">
          Create a pipeline
        </button>
      </nz-col>
      <nz-col [nzSpan]="8">
        <app-input-autofocus [model]="filter" (modelChange)="filterChanged($event)"></app-input-autofocus>
      </nz-col>
    </nz-row>
    @if (project.pipeline_names && project.pipeline_names.length > 0) {
      <nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24, lg: 32 }">
        @for (pip of filteredPipelines; track pip) {
          <nz-col class="cardContainer" [routerLink]="['./pipeline', pip.name]" [nzSpan]="6">
            <app-card [title]="pip.name" [description]="pip.description"></app-card>
          </nz-col>
        }
      </nz-row>
    }
    @if (!project.pipeline_names || project.pipeline_names.length === 0) {
      <nz-row>
        <nz-col [nzSpan]="24">
          <nz-alert nzType="info" nzMessage="No pipeline"></nz-alert>
        </nz-col>
      </nz-row>
    }
  </div>
}
@if (loading) {
  <nz-spin nzTip="Loading pipelines..."></nz-spin>
}
