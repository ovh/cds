<codemirror #code class="code" [ngModel]="value" [config]="codeMirrorConfig" (change)="valueChange($event)">
</codemirror>
@if (editable && removable) {
  <button nz-button nzDanger nzType="primary" class="codeButton" (click)="clickRemove()">
    <i nz-icon nzType="delete" nzTheme="outline"></i>
  </button>
}
@if (this.error) {
  <nz-alert nzType="error" [nzMessage]="this.error.message"></nz-alert>
}
